name: Feature request
description: Propose a new feature or a change to an existing one.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the plugin does not currently support?
      placeholder: I want NPCs to play a click sound when a player interacts with them.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: The behavior, command, or GUI option you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Workaround you use today
      render: text
    validations:
      required: false
